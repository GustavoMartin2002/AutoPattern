[pytest]

# Python path - add backend directory to sys.path
pythonpath = .

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    integration: Integration tests
    slow: Slow running tests

# Output options
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Async support
asyncio_mode = auto